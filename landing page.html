<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>
	<title></title>
	<style>
		*{
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			font-family: gilroy;
		}
		html,
		body{
			height: 100%;
			width: 100%;
		}
		.section1{
			height: 100%;
			width: 100%;
             position: relative;
		}
		nav{
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 60px 80px;
		}
		nav h1{
			font-size: 50px;
		}
		nav h1 i{
			display: inline-block;
			rotate: 45deg;
			font: 55px;
		}
		.part2{
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 80px;

		}
		nav h4{
         font-size: 20px;
         font-weight: 500;
		}
		nav button{
			font-size: 22px;
			border: 1px solid #000;
			font-weight: 600;
			padding: 22px 40px;
			border-radius: 5px;
			background-color: transparent;
		}
		.center{
			background-color: red;
			height: 85%;
			width: 100%;
			display: flex;
		}
		.center-part1{
			background-color: lightblue;
			height: 100%;
			width: 50%;
		}
		.center-part2{
			background-color: lightblue;
			height: 100%;
			width: 50%;
		}

	</style>
</head>
<body>
<section class="section1">
	<nav>
		<h1><i class="ri-shining-2-fill"></i>WizardZ</h1>
		<div class="part2">
			<h4>About us</h4>
			<h4>Services</h4>
			<h4>Use Cases</h4>
			<h4>Pricing</h4>
			<h4>Blog</h4>
			<button>Requeat a quote</button>
		</div>
	</nav>
	<div class="center">
		<div class="center-part1">
			
		</div>
		<div class="center-part2">
			
		</div>
	</div>
</section>
</body>
</html>
